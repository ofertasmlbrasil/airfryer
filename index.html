<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Fryer Multilaser 4L – Oferta Exclusiva</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e8152a;
      --red-dark: #b80f20;
      --yellow: #FFD000;
      --dark: #111111;
      --dark2: #1c1c1c;
      --gray: #2a2a2a;
      --text: #f0f0f0;
      --text-muted: #aaaaaa;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .top-banner {
      background: var(--red);
      text-align: center;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.5px;
      animation: pulse-banner 2s ease-in-out infinite;
    }
    @keyframes pulse-banner {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    .hero {
      max-width: 480px;
      margin: 0 auto;
      padding: 32px 20px 0;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--dark);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 18px;
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 9vw, 52px);
      line-height: 1.0;
      color: #fff;
      margin-bottom: 8px;
    }

    .hero h1 span { color: var(--yellow); }

    .hero .sub {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .product-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 8px;
    }

    .product-img {
      width: 260px;
      height: 260px;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(232,21,42,0.3));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .discount-pill {
      position: absolute;
      top: 10px;
      right: -10px;
      background: var(--red);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      text-align: center;
      box-shadow: 0 4px 20px rgba(232,21,42,0.5);
      animation: pop 0.5s ease 0.3s both;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .price-section {
      background: var(--dark2);
      border: 1px solid var(--gray);
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      text-align: center;
    }

    .price-old {
      font-size: 14px;
      color: var(--text-muted);
      text-decoration: line-through;
      margin-bottom: 4px;
    }

    .price-new {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: var(--yellow);
      line-height: 1;
    }

    .price-new small {
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 700;
      vertical-align: top;
      margin-top: 10px;
      display: inline-block;
    }

    .price-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .benefits {
      margin: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .benefit-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--dark2);
      border: 1px solid var(--gray);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: left;
      animation: slide-in 0.4s ease both;
    }

    .benefit-item:nth-child(1) { animation-delay: 0.1s; }
    .benefit-item:nth-child(2) { animation-delay: 0.2s; }
    .benefit-item:nth-child(3) { animation-delay: 0.3s; }
    .benefit-item:nth-child(4) { animation-delay: 0.4s; }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .benefit-icon { font-size: 24px; flex-shrink: 0; }

    .benefit-text strong {
      display: block;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 2px;
    }

    .benefit-text span { font-size: 12px; color: var(--text-muted); }

    .rating-bar {
      background: var(--dark2);
      border: 1px solid var(--gray);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .rating-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px;
      color: var(--yellow);
      line-height: 1;
    }

    .stars { font-size: 18px; margin-bottom: 2px; }
    .rating-desc { font-size: 12px; color: var(--text-muted); }

    .cta-wrap { margin: 8px 0 32px; }

    .cta-btn {
      display: block;
      width: 100%;
      background: var(--red);
      color: #fff;
      text-decoration: none;
      font-size: 18px;
      font-weight: 900;
      padding: 18px 24px;
      border-radius: 14px;
      text-align: center;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 32px rgba(232,21,42,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .cta-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: shimmer 2.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 200%; }
    }

    .cta-btn:active { transform: scale(0.97); }

    .cta-sub {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .urgency {
      background: linear-gradient(135deg, #1a0a00, #2a1000);
      border: 1px solid #5a2a00;
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
      margin-bottom: 28px;
    }
